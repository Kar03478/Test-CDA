<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Sistemas Distribuidos</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.app {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

.progress {
    height: 8px;
    background: #334155;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-bar {
    height: 100%;
    background: #22c55e;
    width: 0%;
    transition: width 0.3s;
}

.question {
    font-size: 18px;
    margin-bottom: 20px;
}

.option {
    display: block;
    background: #334155;
    padding: 12px;
    border-radius: 10px;
    margin: 8px 0;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    background: #475569;
}

.selected {
    background: #3b82f6;
}

.correct {
    background: #22c55e !important;
}

.incorrect {
    background: #ef4444 !important;
}

button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.result {
    font-size: 22px;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="app">
<h1>🧠 Test</h1>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<div id="pregunta" class="question"></div>
<div id="respuestas"></div>

<button onclick="siguiente()">Siguiente</button>

<div id="resultado" class="result"></div>
</div>

<script>
const preguntas = [
{q:"Las URL/URIs proporcionan:",a:["Acceso","Ubicación","Concurrencia","Ninguna"],c:1},
{q:"Transparencia de acceso oculta:",a:["Representación datos","Fallos","Localización","Concurrencia"],c:0},
{q:"Google AppEngine es:",a:["PPV","IaaS","SaaS","PaaS"],c:3},
{q:"Topología más escalable:",a:["Bus","Árbol","Hipercubo","Crossbar"],c:2},
{q:"Diámetro toroide:",a:["N/2","N","2(√N-1)","log2(N)"],c:2},
{q:"SIMD:",a:["Nvidia Tesla","Cray Y-MP","MMX","Todos"],c:3},
{q:"Eficiencia:",a:["0.5 → doble tiempo","No >1","Más procesadores mejor","Todas"],c:1},
{q:"Gustafson:",a:["9.17","20.5","90.1","100"],c:2},
{q:"Menos comunicación:",a:["Filas","Columnas","Bloques","Cíclica"],c:2},
{q:"Master/Worker pool:",a:["Menos congestión","Mejor balanceo","Mejor sync","Menos comunicaciones"],c:1},

{q:"Árbol ancho bisección:",a:["1","√N","N/2","log2N"],c:0},
{q:"Topología indirecta:",a:["Hipercubo","Omega","Crossbar","Toroide"],c:1},
{q:"Transparencia ubicación:",a:["Localización","Concurrencia","Datos","Fallos"],c:0},
{q:"No interesa ocultar:",a:["Redes","Replicación","Ubicación usuarios","Ninguna"],c:1},
{q:"Mirrors:",a:["Replicación","Ubicación","Acceso","Ninguna"],c:0},
{q:"No repudio:",a:["HTTPS","Antivirus","Firma digital","Certificados"],c:2},
{q:"No ejecución remota:",a:["RPC","Objetos","Mensajes","a y b"],c:3},
{q:"Cloud carga variable:",a:["Elasticidad","Pago","Confiabilidad","Escalabilidad"],c:0},
{q:"Chord/Pastry:",a:["Binaria","Quicksort","Hash","a y c"],c:2},

{q:"Heterogeneidad:",a:["Hardware","SO","Lenguaje","Todas"],c:3},
{q:"RMI:",a:["Solo cliente","rmic obligatorio","No objetos","Ninguna"],c:3},
{q:"Sistema abierto:",a:["Código","Siempre accesible","Interoperable","Seguro"],c:2},
{q:"Migración vs recolocación:",a:["Replicación","Tipo recursos","Volumen","Uso de recursos"],c:3},
{q:"Escalabilidad geográfica:",a:["CDN","Servidor horizontal","Más ancho banda","RAID"],c:0},
{q:"Cloud Office365:",a:["IaaS","SaaS","PaaS","Ninguna"],c:1}
];

let actual = 0;
let aciertos = 0;
let seleccion = null;

function cargarPregunta() {
    const p = preguntas[actual];
    document.getElementById("pregunta").innerText = (actual+1)+". "+p.q;

    let html = "";
    p.a.forEach((op, i) => {
        html += `<div class="option" onclick="seleccionar(this, ${i})">${op}</div>`;
    });

    document.getElementById("respuestas").innerHTML = html;
    seleccion = null;

    document.getElementById("barra").style.width =
        ((actual)/preguntas.length)*100 + "%";
}

function seleccionar(el, i) {
    document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
    el.classList.add("selected");
    seleccion = i;
}

function siguiente() {
    if (seleccion === null) {
        alert("Selecciona una respuesta");
        return;
    }

    const opciones = document.querySelectorAll(".option");

    if (seleccion === preguntas[actual].c) {
        aciertos++;
        opciones[seleccion].classList.add("correct");
    } else {
        opciones[seleccion].classList.add("incorrect");
        opciones[preguntas[actual].c].classList.add("correct");
    }

    setTimeout(() => {
        actual++;
        if (actual < preguntas.length) {
            cargarPregunta();
        } else {
            document.querySelector(".app").innerHTML =
                `<h1>Resultado</h1>
                 <p class="result">${aciertos} / ${preguntas.length}</p>`;
        }
    }, 800);
}

cargarPregunta();
</script>

</body>
</html>
